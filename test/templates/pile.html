    <script>
        // ===================== MANUAL REMEDY COUNTS =====================
const remedyManualCounts = {
    "A001": { case1: 476, case23: 1027 },
    "A002": { case1: 6,  case23: 1809 },
    "A003": { case1: 4,  case23: 128 },
    "A004": { case1: 14, case23: 3518 },
    "A005": { case1: 0,  case23: 1759 }
};

// ===================== TOTAL PILES PER AREA =====================
const totalPiles = {
    "A001": 3932,
    "A002": 5404,
    "A003": 1932,
    "A004": 7900,
    "A005": 2820
};

let selectedPiles = []; // Array to store selected hotspots
let legendCounts = {};

/* -------------------- OPEN IMAGE MAP -------------------- */

function openImageMap() {
    let container = document.getElementById("imageMapContainer");
    let button = document.querySelector(".image-map-btn-custom");

    if (container.style.display === "none" || container.style.display === "") {
        container.style.display = "block";
        button.textContent = "Close Image Map";
    } else {
        container.style.display = "none";
        button.textContent = "Open Image Map";
    }
}


/* -------------------- SELECT PILES -------------------- */

function togglePileValue(value) {

    let pileIndex = selectedPiles.indexOf(value);

    if (pileIndex === -1) {
        selectedPiles.push(value);
    } else {
        selectedPiles.splice(pileIndex, 1);
    }

    updatePileDisplay();
}


/* -------------------- UPDATE SELECTED PILE TAGS -------------------- */

function updatePileDisplay() {

    let pileContainer = document.getElementById("pileContainer");
    pileContainer.innerHTML = "";

    selectedPiles.forEach((pile, index) => {

        let tag = document.createElement("span");

        tag.classList.add("pile-tag");

        tag.innerHTML = `${pile} <span class="remove-x" onclick="removePile(${index})">×</span>`;

        pileContainer.appendChild(tag);

    });

    document.getElementById("table_id").value = selectedPiles.join(", ");
}


/* -------------------- REMOVE PILE -------------------- */

function removePile(index) {

    let removedPile = selectedPiles[index];

    selectedPiles.splice(index, 1);

    let iframe = document.getElementById("imageMapFrame").contentWindow;

    let hotspotElement = iframe.document.querySelector(`[data-name="${removedPile}"]`);

    if (hotspotElement) {

        hotspotElement.classList.remove("selected-hotspot");

    }

    updatePileDisplay();
}


/* -------------------- SELECT ALL TABLES -------------------- */

function toggleAllPiles() {

    let selectAllButton = document.getElementById("select_all_btn");

    let iframe = document.getElementById("imageMapFrame").contentWindow;

    let hotspots = iframe.document.querySelectorAll("[data-name]");

    selectedPiles = [];

    if (selectAllButton.textContent === "Select All Piles") {

        hotspots.forEach(hotspot => {

            let pileName = hotspot.getAttribute("data-name");

            if (!selectedPiles.includes(pileName)) {

                selectedPiles.push(pileName);

                hotspot.classList.add("selected-hotspot");

            }

        });

        selectAllButton.textContent = "Deselect All Piles";

    } else {

        hotspots.forEach(hotspot => {

            hotspot.classList.remove("selected-hotspot");

        });

        selectAllButton.textContent = "Select All Piles";

    }

    updatePileDisplay();
}


/* -------------------- FORM SUBMIT -------------------- */

document.getElementById("pileForm").addEventListener("submit", function (event) {

    event.preventDefault();

    var formData = new FormData(this);

    fetch("/submit_pile_form", {
        method: "POST",
        body: formData
    })

    .then(response => response.json())

    .then(data => {

        var popupMessage = document.getElementById("popupMessage");

        popupMessage.textContent = data.message || "Error submitting the form";

        if (data.success) {

            popupMessage.classList.remove("failure");

            popupMessage.classList.add("success");

            setTimeout(function () {

                window.location.href = "dashboard";

            }, 3000);

        } else {

            popupMessage.classList.remove("success");

            popupMessage.classList.add("failure");

        }

        popupMessage.style.display = "block";

        setTimeout(function () {

            popupMessage.style.display = "none";

        }, 3000);

    })

    .catch(error => {

        var popupMessage = document.getElementById("popupMessage");

        popupMessage.classList.add("failure");

        popupMessage.textContent = "Error submitting form";

        popupMessage.style.display = "block";

    });

});


/* -------------------- LOAD AREA DROPDOWN -------------------- */

fetch("/get_area_ids")

.then(response => response.json())

.then(data => {

    const areaSelect = document.getElementById("area_id");

    data.areas.forEach(area => {

        const option = document.createElement("option");

        option.value = area.id;

        option.textContent = area.location;

        areaSelect.appendChild(option);

    });

});


/* -------------------- CASE VIEW DROPDOWN -------------------- */

document.getElementById("view_type").addEventListener("change", function(){

    const viewType = this.value;

    updateLegend(viewType); // 🔥 ADD THIS

    if(viewType === "case"){
        loadCaseData();
    } else {
        resetCaseView();
    }

});

document.addEventListener("DOMContentLoaded", function () {
    updateLegend("normal"); // default view
});
/* -------------------- LOAD CASE DATA -------------------- */
function loadCaseData(){

    const area = document.getElementById("area_id").value;

    if(!area){
        alert("Please select area first");
        return;
    }

    fetch(`/get_case_data?area_id=${area}`)
    .then(res=>res.json())
    .then(result=>{

        if(result.success){

            // 🔥 APPLY CASE COLORS
            applyCaseColors(result.data);

            // 🔥 APPLY REMEDY BORDER
            applyRemedyBorders(result.remedy_done || []);

        }

    });
}
/* -------------------- APPLY CASE COLORS -------------------- */
function applyCaseColors(caseData){

let iframe=document.getElementById("imageMapFrame").contentWindow;
let doc=iframe.document;

caseData.forEach(row=>{

let tableId=row.table_id.trim();
let pileNo=parseInt(row.pile_no);
let caseName=row.assessment_case.trim();

let hotspot=doc.querySelector(`[data-name="${tableId}"]`);
if(!hotspot) return;

/* create grid if not exist */

let grid=hotspot.querySelector(".hotspot-case-grid");

if(!grid){

grid=doc.createElement("div");
grid.className="hotspot-case-grid";

for(let i=1;i<=4;i++){

let part=doc.createElement("div");
part.className="case-box";
part.setAttribute("data-pile",i);

grid.appendChild(part);

}

hotspot.appendChild(grid);
}

/* find correct pile part */

let pilePart=grid.querySelector(`[data-pile="${pileNo}"]`);
if(!pilePart) return;

/* apply color */

pilePart.classList.remove("case1","case2","case3","case4");

if(caseName==="Case1") pilePart.classList.add("case1");
if(caseName==="Case2") pilePart.classList.add("case2");
if(caseName==="Case3") pilePart.classList.add("case3");
if(caseName==="Case4") pilePart.classList.add("case4");

});
}
/* -------------------- RESET CASE VIEW -------------------- */


function resetCaseView(){

let iframe = document.getElementById("imageMapFrame").contentWindow;
let doc = iframe.document;

/* remove grids */
let grids = doc.querySelectorAll(".hotspot-case-grid");
grids.forEach(g=>g.remove());

/* 🔥 remove remedy borders */
let hotspots = doc.querySelectorAll("[data-name]");
hotspots.forEach(h=>{
    h.style.border = "";
});
}
function applyRemedyBorders(remedyData){

    let iframe = document.getElementById("imageMapFrame").contentWindow;
    let doc = iframe.document;

    // clear first
    let allHotspots = doc.querySelectorAll("[data-name]");
    allHotspots.forEach(h=>{
        h.classList.remove("remedy-border");
    });

    remedyData.forEach(row=>{

        let tableId = row.table_id.trim();
        let hotspot = doc.querySelector(`[data-name="${tableId}"]`);

        if(!hotspot) return;

        // ✅ USE CLASS (not style)
        hotspot.classList.add("remedy-border");

    });
}

// ===================== AREA CHANGE =====================
document.getElementById("area_id").addEventListener("change", function () {

    const selectedValue = this.value.trim();

    const iframe = document.getElementById("imageMapFrame");

    if (selectedValue) {

        const hotspotURL = `/${selectedValue}remedyhotspot`;

        iframe.src = hotspotURL;

        document.getElementById("imageMapContainer").style.display = "block";

        // ✅ FETCH LEGEND COUNT
        fetch("/get-legend-count", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                area: selectedValue
            })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success){
                legendCounts = data;
                updateLegend(document.getElementById("view_type").value);
            }
        });

        if(document.getElementById("view_type").value === "case"){
            setTimeout(()=>{
                loadCaseData();
            },800);
        }
    }
});

// ===================== PDF DOWNLOAD =====================
async function downloadHotspotPDF() {

try {

const iframe = document.getElementById("imageMapFrame");
const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

const mapContainer = iframeDoc.querySelector(".container");
const legendContainer = document.getElementById("legendContainer");

if (!mapContainer) {
    alert("Map not loaded");
    return;
}

// ✅ Load html2canvas
if (typeof html2canvas === "undefined") {
    await new Promise(resolve => {
        const script = document.createElement("script");
        script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
        script.onload = resolve;
        document.head.appendChild(script);
    });
}

// ==========================================
// 🔥 FIX: PREPARE CIRCLES FOR PDF RENDERING
// ==========================================
const hotspots = iframeDoc.querySelectorAll(".hotspot");

hotspots.forEach(h => {
    let badge = h.querySelector(".count-badge");

    if (badge) {
        // store old styles
        badge.dataset.oldStyle = badge.getAttribute("style") || "";

        // ✅ make it canvas-friendly
        badge.style.width = "5px";
        badge.style.height = "5px";
        badge.style.fontSize = "5px";

        badge.style.display = "block";
        badge.style.textAlign = "center";
        badge.style.lineHeight = "5px";

        badge.style.borderRadius = "50%";
        badge.style.background = "red";
        badge.style.color = "white";

        badge.style.position = "absolute";
        badge.style.top = "50%";
        badge.style.left = "50%";
        badge.style.transform = "translate(-50%, -50%)";
    }
});

// ==========================
// ✅ CAPTURE MAP
// ==========================
const mapCanvas = await html2canvas(mapContainer, {
    useCORS: true,
    allowTaint: true,
    scale: 2
});

const mapImg = mapCanvas.toDataURL("image/png");

// ==========================================
// 🔥 RESTORE ORIGINAL UI
// ==========================================
hotspots.forEach(h => {
    let badge = h.querySelector(".count-badge");

    if (badge && badge.dataset.oldStyle !== undefined) {
        badge.setAttribute("style", badge.dataset.oldStyle);
    }
});

// ==========================
// ✅ CAPTURE LEGENDS
// ==========================
const legendBoxes = legendContainer.querySelectorAll(".legend-box");

if (legendBoxes.length < 2) {
    alert("Legend boxes not found");
    return;
}

const box1Canvas = await html2canvas(legendBoxes[0], { backgroundColor: "#fff", scale: 2 });
const box2Canvas = await html2canvas(legendBoxes[1], { backgroundColor: "#fff", scale: 2 });

const box1Img = box1Canvas.toDataURL("image/png");
const box2Img = box2Canvas.toDataURL("image/png");

// ==========================
// ✅ CREATE PDF
// ==========================
const { jsPDF } = window.jspdf;
const pdf = new jsPDF("landscape", "mm", "a4");

let pageWidth = pdf.internal.pageSize.getWidth();
let pageHeight = pdf.internal.pageSize.getHeight();

// ==========================
// ✅ HEADER
// ==========================
let areaSelect = document.getElementById("area_id");
let areaName = "";

if (areaSelect.selectedIndex > 0) {
    areaName = areaSelect.options[areaSelect.selectedIndex].text.trim();
}

let today = new Date().toLocaleDateString("en-GB");

pdf.setFont("helvetica", "bold");
pdf.setFontSize(16);

pdf.text(areaName, 10, 12);

let rightText = `Report date :- ${today}`;
let rightTextWidth = pdf.getTextWidth(rightText);

pdf.text(rightText, pageWidth - rightTextWidth - 10, 12);

// ==========================
// ✅ MAP
// ==========================
let mapWidth = 280;
let mapHeight = (mapCanvas.height * mapWidth) / mapCanvas.width;

pdf.addImage(mapImg, "PNG", 10, 20, mapWidth, mapHeight);

// ==========================
// ✅ LEGEND SIDE BY SIDE
// ==========================
let boxWidth = 100;

let box1Height = (box1Canvas.height * boxWidth) / box1Canvas.width;
let box2Height = (box2Canvas.height * boxWidth) / box2Canvas.width;

let maxHeight = Math.max(box1Height, box2Height);

let leftX = 20;
let rightX = pageWidth - boxWidth - 20;

let posY = pageHeight - maxHeight - 3;

pdf.addImage(box1Img, "PNG", leftX, posY, boxWidth, box1Height);
pdf.addImage(box2Img, "PNG", rightX, posY, boxWidth, box2Height);

// ==========================
// ✅ FOOTER
// ==========================
let footerText = "INDISOLAR - Software generated report";

pdf.setFont("helvetica", "italic");
pdf.setFontSize(10);
pdf.setTextColor(0, 102, 204);

let footerWidth = pdf.getTextWidth(footerText);

pdf.text(footerText, pageWidth - footerWidth - 40, pageHeight - 3);

pdf.setTextColor(0, 0, 0);

// ==========================
// ✅ SAVE
// Clean areaName (remove spaces/special chars if needed)
let cleanAreaName = areaName.replace(/\s+/g, "_").replace(/[^\w\-]/g, "");

// Create dynamic filename
let fileName = `${cleanAreaName}_hotspotmap.pdf`;

// Save PDF
pdf.save(fileName);

} catch (err) {
    console.error(err);
    alert("PDF generation failed");
}
}

// ===================== LEGEND UPDATE =====================
function updateLegend(viewType) {
    let selectedArea = document.getElementById("area_id").value.trim();
    let total = totalPiles[selectedArea] || 0;

    let legend = document.getElementById("legendContainer");
    legend.innerHTML = "";

    // ============================
    // ✅ BOX 1 → ASSESSMENT SUMMARY
    // ============================

    let box1 = document.createElement("div");
    box1.className = "legend-box";

    let title1 = document.createElement("div");
title1.className = "legend-title";
title1.textContent = `Assessment Summary (Total Piles: ${total})`;
    box1.appendChild(title1);

    // 🔹 Case counts
    let cases = [
        { name: "Case1", color: "red" },
        { name: "Case2", color: "orange" },
        { name: "Case3", color: "yellow" },
        { name: "Case4", color: "green" },
    ];

    cases.forEach(c => {

        let item = document.createElement("div");
        item.className = "legend-item";

        let box = document.createElement("div");
        box.className = "legend-color";
        box.style.background = c.color;

        let text = document.createElement("span");
        let count = legendCounts[c.name.toLowerCase()] || 0;

        text.textContent = `${c.name} [${count}]`;

        item.appendChild(box);
        item.appendChild(text);

        box1.appendChild(item);
    });

// ✅ assessed counts (C1–C4)
let c1 = parseInt(legendCounts["case1"] || 0);
let c2 = parseInt(legendCounts["case2"] || 0);
let c3 = parseInt(legendCounts["case3"] || 0);
let c4 = parseInt(legendCounts["case4"] || 0);

// ✅ total assessed
let assessedTotal = c1 + c2 + c3 + c4;

// ✅ NOT EXCAVATED
let notExcavated = total - assessedTotal;

// safety (no negative)
if (notExcavated < 0) notExcavated = 0;

let normal1 = [
    { name: `Assessment done [${assessedTotal}]`, color: "rgba(0,0,255,0.5)" },
    { name: `Not Excavated [${notExcavated}]`, color: "rgba(135, 206, 250, 0.2)" }
];

    normal1.forEach(n => {

        let item = document.createElement("div");
        item.className = "legend-item";

        let box = document.createElement("div");
        box.className = "legend-color";

        if(n.pattern){
            box.style.background = `
                repeating-linear-gradient(
                    0deg,
                    rgba(0,150,255,0.4),
                    rgba(0,150,255,0.4) 2px,
                    transparent 2px,
                    transparent 6px
                ),
                repeating-linear-gradient(
                    90deg,
                    rgba(0,150,255,0.4),
                    rgba(0,150,255,0.4) 2px,
                    transparent 2px,
                    transparent 6px
                )
            `;
            box.style.border = "1px solid #0096ff";
        } else {
            box.style.background = n.color;
        }

        let text = document.createElement("span");
        text.textContent = n.name;

        item.appendChild(box);
        item.appendChild(text);

        box1.appendChild(item);
    });

    legend.appendChild(box1);

    // ============================
    // ✅ BOX 2 → REMEDY INFO
    // ============================

let box2 = document.createElement("div");
box2.className = "legend-box";

let title2 = document.createElement("div");
title2.className = "legend-title";
title2.textContent = "Remedy Summary";
box2.appendChild(title2);

// 🔹 Remedy Case Counts
let remedyCases = [
    { name: "Case1", color: "red", key: "remedy_case1" },
    
    { name: "Case2 & Case3", color: "orange", key: "case23" }
];

remedyCases.forEach(c => {

    let item = document.createElement("div");
    item.className = "legend-item";

    let box = document.createElement("div");
    box.className = "legend-color";
    box.style.background = c.color;

    let text = document.createElement("span");

let count = 0;

// ✅ get selected area
let selectedArea = document.getElementById("area_id").value.trim();

// ✅ check if manual data exists
let manualData = remedyManualCounts[selectedArea];

if (manualData) {
    // 🔥 USE MANUAL VALUES
    if (c.key === "case23") {
        count = manualData.case23 || 0;
    } else if (c.key === "remedy_case1") {
        count = manualData.case1 || 0;
    }
} else {
    // 🔥 FALLBACK TO OLD LOGIC (no change)
    if (c.key === "case23") {
        count =
            parseInt(legendCounts["remedy_case2"] || 0) +
            parseInt(legendCounts["remedy_case3"] || 0);
    } else {
        count = legendCounts[c.key] || 0;
    }
}

    text.textContent = `${c.name} [${count}]`;

    item.appendChild(box);
    item.appendChild(text);

    box2.appendChild(item);
});

// 🔹 Remedy done (green)
let remedyItem = document.createElement("div");
remedyItem.className = "legend-item";

let remedyBox = document.createElement("div");
remedyBox.className = "legend-color";
remedyBox.style.background = "rgba(0,255,0,0.5)";

let remedyText = document.createElement("span");
remedyText.textContent = "Remedy done";

remedyItem.appendChild(remedyBox);
remedyItem.appendChild(remedyText);

box2.appendChild(remedyItem);



// 🔴 Circle with fixed number (1)
let circleItem = document.createElement("div");
circleItem.className = "legend-item";

let circle = document.createElement("div");
circle.style.width = "14px";
circle.style.height = "14px";
circle.style.borderRadius = "50%";
circle.style.background = "red";
circle.style.color = "white";

circle.style.textAlign = "center";     // ✅ IMPORTANT
circle.style.lineHeight = "14px";      // ✅ IMPORTANT

circle.style.fontSize = "8px";
circle.style.border = "1px solid white";

circle.innerText = "1";

let circleText = document.createElement("span");
circleText.textContent = "Remedy Count";

circleItem.appendChild(circle);
circleItem.appendChild(circleText);

box2.appendChild(circleItem);

legend.appendChild(box2);
}

    </script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.19.3/dist/xlsx.full.min.js"></script>
